name: Update Uptime SVG

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-svg:
    runs-on: ubuntu-latest
    steps:
      # v3 -> v4로 업데이트
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # v4 -> v5로 업데이트
      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 의존성 패키지 설치
        run: pip install python-dateutil

      - name: Uptime 업데이트 스크립트 실행
        run: python update_uptime.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dark_mode.svg light_mode.svg
          
          if git diff-index --quiet HEAD; then
            echo "변경 사항이 없습니다."
          else
            git commit -m "docs: 일일 Uptime SVG 텍스트 업데이트"
            git push
          fi